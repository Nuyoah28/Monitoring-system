server:
  port: ${SERVER_PORT:10215}

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:SweatPear}?serverTimezone=GMT%2B8&rewriteBatchedStatements=true&tinyInt1isBit=false}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
      max-wait: 60000
      min-evictable-idle-time-millis: 300000
      time-between-eviction-runs-millis: 60000
      filters: stat,wall
      validation-query: SELECT 1
      test-on-borrow: true
      test-on-return: true
      test-while-idle: true

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      jedis:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
          timeout: 10000ms
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis
    redis:
      time-to-live: -1
      use-key-prefix: true

oss:
  id: ${COS_SECRET_ID:}
  pass: ${COS_SECRET_KEY:}
  region: ${COS_REGION:ap-beijing}
  bucket: ${COS_BUCKET:my-server-1397492316}
  base-url: ${COS_BASE_URL:https://my-server-1397492316.cos.ap-beijing.myqcloud.com}

agent:
  api:
    url: ${AGENT_API_URL:http://127.0.0.1:5050}

algorithm:
  api:
    url: ${ALGORITHM_API_URL:http://127.0.0.1:6006}

iot:
  mqtt:
    enabled: ${IOT_MQTT_ENABLED:true}
    broker-url: ${IOT_MQTT_BROKER_URL:tcp://127.0.0.1:1883}
    client-id: ${IOT_MQTT_CLIENT_ID:monitoring-system-backend}
    username: ${IOT_MQTT_USERNAME:}
    password: ${IOT_MQTT_PASSWORD:}
    environment-topic: ${IOT_MQTT_ENVIRONMENT_TOPIC:iot/sensor/+/environment}
    alarm-topic: ${IOT_MQTT_ALARM_TOPIC:iot/algo/+/alarm}
    qos: ${IOT_MQTT_QOS:1}

