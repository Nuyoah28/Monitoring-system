services:
  backend:
    image: monitoring-system-backend:0.0.1-SNAPSHOT
    container_name: monitoring-system-backend
    restart: always
    network_mode: host
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-10215}
      MYSQL_HOST: ${MYSQL_HOST:-127.0.0.1}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-SweatPear}
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AGENT_API_URL: ${AGENT_API_URL:-http://127.0.0.1:5050}
      ALGORITHM_API_URL: ${ALGORITHM_API_URL:-http://127.0.0.1:6006}
      IOT_MQTT_ENABLED: ${IOT_MQTT_ENABLED:-true}
      IOT_MQTT_BROKER_URL: ${IOT_MQTT_BROKER_URL:-tcp://127.0.0.1:1883}
      IOT_MQTT_CLIENT_ID: ${IOT_MQTT_CLIENT_ID:-monitoring-system-backend}
      IOT_MQTT_USERNAME: ${IOT_MQTT_USERNAME:-}
      IOT_MQTT_PASSWORD: ${IOT_MQTT_PASSWORD:-}
      IOT_MQTT_ENVIRONMENT_TOPIC: ${IOT_MQTT_ENVIRONMENT_TOPIC:-iot/sensor/+/environment}
      IOT_MQTT_ALARM_TOPIC: ${IOT_MQTT_ALARM_TOPIC:-iot/algo/+/alarm}
      IOT_MQTT_QOS: ${IOT_MQTT_QOS:-1}
