name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

env:
  SERVER_PROJECT_DIR: /opt/Monitoring-system

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PROJECT_DIR: ${{ env.SERVER_PROJECT_DIR }}
        run: |
          test -n "$SERVER_HOST" || (echo "Missing secret: SERVER_HOST" && exit 1)
          test -n "$SERVER_USER" || (echo "Missing secret: SERVER_USER" && exit 1)
          test -n "$SERVER_SSH_KEY" || (echo "Missing secret: SERVER_SSH_KEY" && exit 1)
          test -n "$SERVER_PROJECT_DIR" || (echo "Missing workflow env: SERVER_PROJECT_DIR" && exit 1)

      - name: Deploy to server by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            PROJECT_DIR="${{ env.SERVER_PROJECT_DIR }}"
            BRANCH="${{ github.ref_name }}"
            REPO_URL="https://github.com/Nuyoah28/Monitoring-system.git"

            echo "[debug] host: $(hostname)"
            echo "[debug] user: $(whoami)"
            echo "[debug] home: $HOME"
            echo "[debug] pwd: $(pwd)"
            echo "[debug] project dir: $PROJECT_DIR"
            ls -ld /opt || true
            ls -ld "$PROJECT_DIR" || true
            ls -ld "$PROJECT_DIR/.git" || true

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "git repository not found under $PROJECT_DIR"
              echo "please prepare the project on the server first"
              exit 1
            fi

            if [ -f "$PROJECT_DIR/backend/scripts/deploy-server.sh" ]; then
              DEPLOY_SCRIPT="$PROJECT_DIR/backend/scripts/deploy-server.sh"
            elif [ -f "$PROJECT_DIR/scripts/deploy-server.sh" ]; then
              DEPLOY_SCRIPT="$PROJECT_DIR/scripts/deploy-server.sh"
            else
              echo "deploy-server.sh not found under $PROJECT_DIR"
              exit 1
            fi

            if command -v bash >/dev/null 2>&1; then
              bash -lc "
                source ~/.bashrc >/dev/null 2>&1 || true
                if command -v clashon >/dev/null 2>&1; then
                  echo '[debug] enabling proxy via clashon'
                  clashon
                else
                  echo '[debug] clashon not found in bash environment'
                fi
                sh \"$DEPLOY_SCRIPT\" \"$PROJECT_DIR\" \"$BRANCH\" \"$REPO_URL\"
              "
            else
              echo "[debug] bash not found, running deploy without clashon bootstrap"
              sh "$DEPLOY_SCRIPT" "$PROJECT_DIR" "$BRANCH" "$REPO_URL"
            fi
