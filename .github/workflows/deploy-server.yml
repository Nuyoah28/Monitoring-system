name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.SERVER_HOST != '' && secrets.SERVER_USER != '' && secrets.SERVER_SSH_KEY != '' && secrets.SERVER_PROJECT_DIR != '' }}

    steps:
      - name: Deploy to server by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            sh "${{ secrets.SERVER_PROJECT_DIR }}/scripts/deploy-server.sh" "${{ secrets.SERVER_PROJECT_DIR }}" "main" "https://github.com/Nuyoah28/Monitoring-system.git"
