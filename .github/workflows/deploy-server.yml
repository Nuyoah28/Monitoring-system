name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PROJECT_DIR: ${{ secrets.SERVER_PROJECT_DIR }}
        run: |
          test -n "$SERVER_HOST" || (echo "Missing secret: SERVER_HOST" && exit 1)
          test -n "$SERVER_USER" || (echo "Missing secret: SERVER_USER" && exit 1)
          test -n "$SERVER_SSH_KEY" || (echo "Missing secret: SERVER_SSH_KEY" && exit 1)
          test -n "$SERVER_PROJECT_DIR" || (echo "Missing secret: SERVER_PROJECT_DIR" && exit 1)

      - name: Deploy to server by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            sh "${{ secrets.SERVER_PROJECT_DIR }}/scripts/deploy-server.sh" "${{ secrets.SERVER_PROJECT_DIR }}" "main" "https://github.com/Nuyoah28/Monitoring-system.git"
